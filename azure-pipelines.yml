# Docker
# Build and push an image to Azure Container Registry
# https://docs.microsoft.com/azure/devops/pipelines/languages/docker

trigger:
- main

resources:
- repo: self

variables:
  # Container registry service connection established during pipeline creation
  dockerRegistryServiceConnection: '087de67a-3f9d-460a-a5d7-d775349ff239'
  imageRepository: 'todoapp'
  containerRegistry: 'todoappproject1.azurecr.io'
  dockerfilePath: '$(Build.SourcesDirectory)/Dockerfile'
  tag: '$(Build.BuildId)'

  # Agent VM image name
  vmImageName: 'ubuntu-latest'

stages:
- stage: Build
  displayName: Build and push stage
  jobs:
  - job: Build
    displayName: Build
    pool:
      vmImage: $(vmImageName)
    steps:
    - task: AzureCLI@2
      inputs:
        azureSubscription: 'Azure subscription 1(8680646a-895e-4208-9f58-9b1d6f47a4a1)'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: 'az acr login --name=$(containerRegistry)'
    - task: Docker@2
      displayName: Build and push an image to container registry
      inputs:
        command: buildAndPush
        repository: $(imageRepository)
        dockerfile: $(dockerfilePath)
        containerRegistry: $(dockerRegistryServiceConnection)
        tags: |
          $(tag)
    - task: AzureCLI@2
      inputs:
        azureSubscription: 'Azure subscription 1(8680646a-895e-4208-9f58-9b1d6f47a4a1)'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          az container create \
          --name todoapp1 \
          --resource-group ToDoApp \
          --image $(containerRegistry)/$(imageRepository):$(tag) \
          --registry-login-server $(containerRegistry) \
          --registry-username todoappproject1 \
          --registry-password 2t2Fgk3aOiW4hYBzopjgOOr8hQCBeC4QGsbKPAyOmuXoqe0Jj2HlJQQJ99CCACBsN54Eqg7NAAACAZCRcWtP \
          --os-type linux
          --dns-name-label aci-demo-todoapp01
